name: ci

on:
  pull_request:
  push:
    branches: [ master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: composer validate --no-interaction --strict
      - run: composer install --no-interaction --no-progress --prefer-dist
      - run: composer run -n audit:composer-integrity
      - run: composer run -n lint
      - run: composer run -n lint:admin
      - run: composer run -n fixture:validate
      - run: composer run -n audit:surface
      - run: composer run -n audit:contract
      - run: composer run -n audit:route
      - run: composer run -n audit:bootstrap
      - run: composer run -n audit:bootstrap-runtime
      - run: composer run -n audit:config
      - run: composer run -n audit:sdk
      - run: composer run -n audit:demo-truth-pack
      - run: composer run -n audit:release-grade-portrait
      - run: composer run -n audit:version
      - run: composer run -n audit:canonical-stale
      - run: composer run -n audit:canonical-structure
      - run: composer run -n audit:repo-hygiene
      - run: composer run -n audit:snapshot-purity
      - run: composer run -n audit:repo-map-truth
      - run: composer run -n audit:ci-workflow

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none
      - run: composer install --no-interaction --no-progress --prefer-dist
      - run: composer run -n audit:composer-integrity
      - run: composer run -n audit:ci-workflow
      - name: Run phpunit (unit)
        run: composer run -n test:unit

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: app
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U app -d app"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none
          extensions: pdo, pdo_pgsql
      - run: composer install --no-interaction --no-progress --prefer-dist
      - run: composer run -n audit:composer-integrity
      - run: composer run -n audit:ci-workflow
      - name: Migrate schema
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client
          export PSQL_URL="postgresql://$POSTGRES_USER:$POSTGRES_PASSWORD@$DB_HOST:$DB_PORT/$POSTGRES_DB"
          for f in db/postgres/migrations/*.sql; do
            psql "$PSQL_URL" -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Run phpunit (integration)
        run: composer run -n test:integration

  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none
      - run: composer install --no-interaction --no-progress --prefer-dist
      - run: composer run -n audit:composer-integrity
      - run: composer run -n audit:ci-workflow
      - name: Run phpstan
        run: |
          curl -fsSL -o phpstan.phar https://github.com/phpstan/phpstan/releases/latest/download/phpstan.phar
          php phpstan.phar --version
          php phpstan.phar analyse -c phpstan.neon.dist

  runtime-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: app
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U app -d app"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DB_DSN: pgsql:host=127.0.0.1;port=5432;dbname=app
      DB_USER: app
      DB_PASS: app
      TENANT: demo
      BASE_URL: http://127.0.0.1:8080
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none
          extensions: curl, pdo, pdo_pgsql
      - run: composer install --no-interaction --no-progress --prefer-dist
      - run: composer run -n audit:composer-integrity
      - run: composer run -n audit:ci-workflow
      - run: composer run -n db:migrate
      - run: composer run -n demo:seed
      - run: composer run -n audit:bootstrap
      - run: composer run -n audit:version
      - name: Start host-minimal
        run: php -S 127.0.0.1:8080 host-minimal/index.php > /tmp/tag-host.log 2>&1 &
      - name: Wait for status
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/tag/_status > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/tag-host.log || true
          exit 1
      - run: composer run -n smoke:runtime
      - name: Upload host-minimal runtime log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-smoke-host-log
          path: /tmp/tag-host.log
          if-no-files-found: ignore
