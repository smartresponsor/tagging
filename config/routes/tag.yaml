tag_status:
  path: /tag/_status
  controller: App\Http\Api\Tag\StatusController::status
  methods: [GET]

tag_surface:
  path: /tag/_surface
  controller: App\Http\Api\Tag\SurfaceController::surface
  methods: [GET]

tag_create:
  path: /tag
  controller: App\Http\Api\Tag\TagController::create
  methods: [POST]

tag_get:
  path: /tag/{id}
  controller: App\Http\Api\Tag\TagController::get
  methods: [GET]

tag_patch:
  path: /tag/{id}
  controller: App\Http\Api\Tag\TagController::patch
  methods: [PATCH]

tag_delete:
  path: /tag/{id}
  controller: App\Http\Api\Tag\TagController::delete
  methods: [DELETE]

tag_assign:
  path: /tag/{id}/assign
  controller: App\Http\Api\Tag\TagAssignmentController::assign
  methods: [POST]

tag_unassign:
  path: /tag/{id}/unassign
  controller: App\Http\Api\Tag\TagAssignmentController::unassign
  methods: [POST]

tag_assignments:
  path: /tag/assignments
  controller: App\Http\Api\Tag\TagAssignmentReadController::listByEntity
  methods: [GET]

tag_search:
  path: /tag/search
  controller: App\Http\Api\Tag\TagSearchController::get
  methods: [GET]

tag_suggest:
  path: /tag/suggest
  controller: App\Http\Api\Tag\TagSuggestController::get
  methods: [GET]
