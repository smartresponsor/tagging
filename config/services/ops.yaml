services:
    App\Infrastructure\Config\TagRuntimeConfigFactory: ~

    tag.webhook_config:
        class: array
        factory: ['App\Infrastructure\Config\TagRuntimeConfigFactory', 'webhookConfig']

    tag.observability_config:
        class: array
        factory: ['App\Infrastructure\Config\TagRuntimeConfigFactory', 'observabilityConfig']

    tag.security_config:
        class: array
        factory: ['App\Infrastructure\Config\TagRuntimeConfigFactory', 'securityConfig']

    tag.entity_types:
        class: array
        factory: ['App\Infrastructure\Config\TagRuntimeConfigFactory', 'entityTypes']

    App\Service\Core\Tag\Webhook\TagWebhookRegistry:
        arguments:
            $path: '%env(default::TAG_WEBHOOK_REGISTRY_PATH)%'

    App\Service\Core\Tag\Webhook\TagWebhookSender:
        arguments:
            $cfg: '@tag.webhook_config'

    App\Service\Core\Tag\Audit\TagAuditEmitter:
        arguments:
            $cfg: '@tag.webhook_config'
            $sender: '@App\Service\Core\Tag\Webhook\TagWebhookSender'
