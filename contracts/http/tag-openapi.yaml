openapi: 3.1.0
info:
  title: Tag API
  version: 0.2.1
servers:
  - url: http://localhost:8080
paths:
  /tag:
    post:
      summary: Create tag
  /tag/{id}:
    get:
      summary: Get tag
    patch:
      summary: Patch tag
    delete:
      summary: Delete tag
  /tag/{id}/assign:
    post:
      summary: Assign tag to entity
  /tag/{id}/unassign:
    post:
      summary: Unassign tag from entity
  /tag/assignments:
    get:
      summary: List assignments by entityType/entityId
  /tag/search:
    get:
      summary: Search tags
  /tag/suggest:
    get:
      summary: Suggest tags
  /tag/_status:
    get:
      summary: Status and DB readiness
  /tag/_surface:
    get:
      summary: Public runtime surface catalog
